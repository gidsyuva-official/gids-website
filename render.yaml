services:
  - type: web
    name: gids-website
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_HOST
        fromDatabase:
          name: gids-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gids-postgres
          property: port
      - key: DB_USER
        fromDatabase:
          name: gids-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gids-postgres
          property: password
      - key: DB_NAME
        fromDatabase:
          name: gids-postgres
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: gids-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: VERIFY_LINK_EXPIRES_MINUTES
        value: 15
      - key: NODE_ENV
        value: production
databases:
  - name: gids-postgres
    databaseName: gids_database
    user: gids_user
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
